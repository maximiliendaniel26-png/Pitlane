<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Proxy</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  button { padding: 12px 20px; font-size: 16px; margin-bottom: 20px; }
  pre { white-space: pre-wrap; word-break: break-all; background: #000; padding: 16px; border: 1px solid #333; }
</style>
</head>
<body>
<h2>Test du proxy Vercel</h2>
<button onclick="test()">Tester l'appel API</button>
<pre id="output">Clique sur le bouton pour tester...</pre>

<script>
async function test() {
  const out = document.getElementById('output');
  out.textContent = "Envoi de la requête...";
  try {
    const response = await fetch("https://pitlane-lake.vercel.app/api/digest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: "Dis juste bonjour en une phrase." }]
      })
    });
    const text = await response.text();
    out.textContent = "STATUS: " + response.status + "\n\n" + text;
  } catch (err) {
    out.textContent = "ERREUR JS: " + err.message;
  }
}
</script>
</body>
</html>
