<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pit Lane — L'actu motorsport synthétisée</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --border:    #2a2a2a;
    --red:       #e8212b;
    --red-dim:   #7a1218;
    --white:     #f0ede8;
    --muted:     #666;
    --f1:        #e8212b;
    --wrc:       #3b82f6;
    --wec:       #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span { color: var(--red); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .timestamp {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 14px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--muted);
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab:hover { color: var(--white); }
  .tab.active[data-series="F1"]  { color: var(--f1);  border-bottom-color: var(--f1); }
  .tab.active[data-series="WRC"] { color: var(--wrc); border-bottom-color: var(--wrc); }
  .tab.active[data-series="WEC"] { color: var(--wec); border-bottom-color: var(--wec); }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .btn-refresh:hover { border-color: var(--red); background: #1a1010; }
  .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

  .spin { display: none; }
  .btn-refresh.loading .spin { display: inline; animation: spin 0.8s linear infinite; }
  .btn-refresh.loading .icon-static { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .digest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .digest-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .series-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-F1  { background: var(--red-dim); color: var(--f1); }
  .badge-WRC { background: #1e3a5f; color: var(--wrc); }
  .badge-WEC { background: #4a3000; color: var(--wec); }

  .digest-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    line-height: 1.2;
    flex: 1;
  }

  .digest-body {
    padding: 20px;
    font-size: 14px;
    line-height: 1.75;
    color: #c8c5c0;
  }

  .digest-body p { margin-bottom: 12px; }
  .digest-body p:last-child { margin-bottom: 0; }

  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }

  .skel-line {
    height: 12px;
    background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    margin-bottom: 10px;
    border-radius: 2px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .skel-line.short  { width: 40%; }
  .skel-line.medium { width: 70%; }
  .skel-line.full   { width: 100%; }

  .error-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .error-msg .icon { font-size: 32px; margin-bottom: 12px; }
  .error-msg p { font-size: 14px; }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-state .big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 64px;
    font-weight: 900;
    color: #1e1e1e;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 16px;
  }

  .empty-state p { font-size: 14px; margin-bottom: 24px; }

  footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .red-line { width: 24px; height: 2px; background: var(--red); }

  footer span {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    main { padding: 24px 16px 64px; }
    .tabs { padding: 0 16px; }
    .tab { padding: 12px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Pit<span>Lane</span></div>
  <div class="header-right">
    <span class="timestamp" id="last-update">—</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-series="F1">Formule 1</button>
  <button class="tab" data-series="WRC">WRC</button>
  <button class="tab" data-series="WEC">WEC / Le Mans</button>
</nav>

<main>
  <div class="refresh-bar">
    <span class="section-label">Actualités du jour</span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadDigest()">
      <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      <svg class="icon-static" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Actualiser
    </button>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="big">PL</div>
      <p>Lance une actualisation pour obtenir les actus du jour.</p>
      <button class="btn-refresh" onclick="loadDigest()" style="margin: 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Charger l'actu
      </button>
    </div>
  </div>
</main>

<footer>
  <div class="red-line"></div>
  <span>Synthèse IA · Sources vérifiées</span>
  <div class="red-line"></div>
</footer>

<script>
const PROXY = "https://pitlane-lake.vercel.app/api/digest";

const SERIES_CONFIG = {
  F1: {
    label: "Formule 1",
    prompt: `Tu es un journaliste sport automobile francophone. Recherche sur le web les actualités de la Formule 1 de ces derniers jours.

Identifie tous les sujets distincts qui méritent un article séparé aujourd'hui. Le premier article doit TOUJOURS être, si une course a eu lieu récemment, la synthèse complète du dernier Grand Prix (résultats, déroulé de course, faits marquants). Ajoute ensuite d'autres articles séparés selon l'actualité réelle : classement championnat, transferts ou rumeurs de pilotes, actu technique/réglementaire, déclarations marquantes, calendrier, etc. Le nombre total d'articles dépend de l'actualité réelle du jour — n'invente rien, ne force pas un nombre fixe.

Réponds UNIQUEMENT avec un objet JSON valide (pas de texte avant/après, pas de balises markdown), au format suivant :
{
  "articles": [
    {
      "category": "Résultat course" | "Championnat" | "Transferts" | "Technique" | "Déclarations" | "Calendrier" | autre catégorie courte pertinente,
      "title": "titre accrocheur 6-10 mots",
      "body": "2 à 3 paragraphes de texte journalistique factuel en français, séparés par \\n\\n"
    }
  ]
}

Date d'aujourd'hui : ${new Date().toLocaleDateString('fr-FR')}.`
  },
  WRC: {
    label: "WRC",
    prompt: `Tu es un journaliste sport automobile francophone spécialisé en rallye. Recherche sur le web les actualités du WRC de ces derniers jours.

Identifie tous les sujets distincts qui méritent un article séparé aujourd'hui. Le premier article doit TOUJOURS être, si un rallye a eu lieu récemment, la synthèse complète du dernier rallye (résultats, déroulé, faits marquants). Ajoute ensuite d'autres articles séparés selon l'actualité réelle : classement championnat, transferts ou rumeurs pilotes/co-pilotes, actu technique/réglementaire, déclarations marquantes, calendrier, etc. Le nombre total d'articles dépend de l'actualité réelle du jour — n'invente rien, ne force pas un nombre fixe.

Réponds UNIQUEMENT avec un objet JSON valide (pas de texte avant/après, pas de balises markdown), au format suivant :
{
  "articles": [
    {
      "category": "Résultat rallye" | "Championnat" | "Transferts" | "Technique" | "Déclarations" | "Calendrier" | autre catégorie courte pertinente,
      "title": "titre accrocheur 6-10 mots",
      "body": "2 à 3 paragraphes de texte journalistique factuel en français, séparés par \\n\\n"
    }
  ]
}

Date d'aujourd'hui : ${new Date().toLocaleDateString('fr-FR')}.`
  },
  WEC: {
    label: "WEC / Le Mans",
    prompt: `Tu es un journaliste sport automobile francophone spécialisé en endurance. Recherche sur le web les actualités du WEC et des 24 Heures du Mans de ces derniers jours.

Identifie tous les sujets distincts qui méritent un article séparé aujourd'hui. Le premier article doit TOUJOURS être, si une course a eu lieu récemment, la synthèse complète de la dernière course/des 24H du Mans (résultats, déroulé, faits marquants). Ajoute ensuite d'autres articles séparés selon l'actualité réelle : classement championnat constructeurs/pilotes, transferts ou rumeurs, actu technique/réglementaire (Hypercar, LMGT3...), déclarations marquantes, calendrier, etc. Le nombre total d'articles dépend de l'actualité réelle du jour — n'invente rien, ne force pas un nombre fixe.

Réponds UNIQUEMENT avec un objet JSON valide (pas de texte avant/après, pas de balises markdown), au format suivant :
{
  "articles": [
    {
      "category": "Résultat course" | "Championnat" | "Transferts" | "Technique" | "Déclarations" | "Calendrier" | autre catégorie courte pertinente,
      "title": "titre accrocheur 6-10 mots",
      "body": "2 à 3 paragraphes de texte journalistique factuel en français, séparés par \\n\\n"
    }
  ]
}

Date d'aujourd'hui : ${new Date().toLocaleDateString('fr-FR')}.`
  }
};

let currentSeries = "F1";
let cache = {};

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSeries = tab.dataset.series;
    if (cache[currentSeries]) {
      renderArticles(cache[currentSeries]);
    } else {
      showEmpty();
    }
  });
});

function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="big">PL</div>
      <p>Lance une actualisation pour obtenir les actus ${SERIES_CONFIG[currentSeries].label}.</p>
      <button class="btn-refresh" onclick="loadDigest()" style="margin: 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Charger l'actu
      </button>
    </div>`;
}

function showSkeleton() {
  document.getElementById('content').innerHTML = `
    <div class="skeleton">
      <div class="skel-line short"></div>
      <div class="skel-line full" style="margin-top:16px;height:16px"></div>
      <div class="skel-line full"></div>
      <div class="skel-line medium"></div>
    </div>
    <div class="skeleton">
      <div class="skel-line short"></div>
      <div class="skel-line full" style="margin-top:16px;height:16px"></div>
      <div class="skel-line full"></div>
      <div class="skel-line medium"></div>
    </div>
    <div class="skeleton">
      <div class="skel-line short"></div>
      <div class="skel-line full" style="margin-top:16px;height:16px"></div>
      <div class="skel-line full"></div>
    </div>`;
}

async function callClaude(userMessage) {
  const response = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      messages: [{ role: "user", content: userMessage }]
    })
  });
  if (!response.ok) throw new Error("API error " + response.status);
  const data = await response.json();
  const text = (data.content || [])
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");
  return text;
}

function extractJSON(text) {
  let cleaned = text.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error("Pas de JSON trouvé dans la réponse");
  cleaned = cleaned.slice(start, end + 1);
  return JSON.parse(cleaned);
}

async function loadDigest() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  btn.disabled = true;
  showSkeleton();

  const config = SERIES_CONFIG[currentSeries];

  try {
    const raw = await callClaude(config.prompt);
    const parsed = extractJSON(raw);
    const articles = (parsed.articles || []).filter(a => a.title && a.body);

    if (articles.length === 0) {
      throw new Error("Aucun article généré");
    }

    cache[currentSeries] = articles;
    renderArticles(articles);

    const now = new Date();
    document.getElementById('last-update').textContent =
      `Mis à jour ${now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;

  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-msg">
        <div class="icon">⚠</div>
        <p>Impossible de charger l'actu. Vérifie ta connexion et réessaie.</p>
        <p style="font-size:12px;margin-top:8px;color:#444">${err.message}</p>
      </div>`;
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderArticles(articles) {
  const html = articles.map(article => {
    const paragraphs = article.body
      .split('\n')
      .map(p => p.trim())
      .filter(p => p.length > 0)
      .map(p => `<p>${p}</p>`)
      .join('');

    return `
      <div class="digest-card">
        <div class="digest-header">
          <span class="series-badge badge-${currentSeries}">${article.category || currentSeries}</span>
          <span class="digest-title">${article.title}</span>
        </div>
        <div class="digest-body">${paragraphs}</div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
