<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pit Lane — L'actu motorsport synthétisée</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --border:    #2a2a2a;
    --red:       #e8212b;
    --red-dim:   #7a1218;
    --white:     #f0ede8;
    --muted:     #666;
    --f1:        #e8212b;
    --wrc:       #3b82f6;
    --wec:       #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .logo span { color: var(--red); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .timestamp {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 56px;
    background: var(--bg);
    z-index: 99;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 14px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--muted);
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab:hover { color: var(--white); }
  .tab.active[data-series="F1"]  { color: var(--f1);  border-bottom-color: var(--f1); }
  .tab.active[data-series="WRC"] { color: var(--wrc); border-bottom-color: var(--wrc); }
  .tab.active[data-series="WEC"] { color: var(--wec); border-bottom-color: var(--wec); }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .btn-refresh:hover { border-color: var(--red); background: #1a1010; }
  .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

  .spin { display: none; }
  .btn-refresh.loading .spin { display: inline; animation: spin 0.8s linear infinite; }
  .btn-refresh.loading .icon-static { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .article-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }

  .article-card:hover { border-color: #444; }
  .article-card:active { transform: scale(0.99); }

  .article-image {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: #1a1a1a;
  }

  .article-image.img-loading {
    background: linear-gradient(90deg, #1a1a1a 25%, #232323 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  .article-content { padding: 16px 18px 18px; }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .series-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-F1  { background: var(--red-dim); color: var(--f1); }
  .badge-WRC { background: #1e3a5f; color: var(--wrc); }
  .badge-WEC { background: #4a3000; color: var(--wec); }

  .article-list-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: 0.01em;
    line-height: 1.25;
  }

  .article-excerpt {
    font-size: 13px;
    color: #9a958d;
    margin-top: 6px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .reader-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    display: none;
  }

  .reader-overlay.open { display: block; }

  .reader-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 10;
  }

  .btn-back {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 0;
  }

  .reader-image {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
    background: #1a1a1a;
  }

  .reader-body-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  .reader-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .reader-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: 0.01em;
    margin-bottom: 20px;
  }

  .reader-text {
    font-size: 16px;
    line-height: 1.85;
    color: #d4d1cb;
  }

  .reader-text p { margin-bottom: 18px; }
  .reader-text p:last-child { margin-bottom: 0; }
  .reader-text p:first-of-type::first-letter {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 48px;
    float: left;
    line-height: 0.8;
    margin: 8px 8px 0 0;
    color: var(--red);
  }

  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .skeleton-img {
    width: 100%;
    height: 180px;
    background: linear-gradient(90deg, #1a1a1a 25%, #232323 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .skeleton-text-block { padding: 16px 18px 18px; }
  .skel-line {
    height: 12px;
    background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    margin-bottom: 10px;
    border-radius: 2px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .skel-line.short  { width: 40%; }
  .skel-line.medium { width: 70%; }
  .skel-line.full   { width: 100%; }

  .error-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .error-msg .icon { font-size: 32px; margin-bottom: 12px; }
  .error-msg p { font-size: 14px; }

  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .empty-state .big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 64px;
    font-weight: 900;
    color: #1e1e1e;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 16px;
  }
  .empty-state p { font-size: 14px; margin-bottom: 24px; }

  footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 50;
  }

  .red-line { width: 24px; height: 2px; background: var(--red); }

  footer span {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    main { padding: 24px 16px 64px; }
    .tabs { padding: 0 16px; }
    .tab { padding: 12px 14px; }
    .reader-title { font-size: 25px; }
    .reader-body-wrap { padding: 24px 18px 80px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="closeReader()">Pit<span>Lane</span></div>
  <div class="header-right">
    <span class="timestamp" id="last-update">—</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-series="F1">Formule 1</button>
  <button class="tab" data-series="WRC">WRC</button>
  <button class="tab" data-series="WEC">WEC / Le Mans</button>
</nav>

<main>
  <div class="refresh-bar">
    <span class="section-label">Actualités du jour</span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadDigest()">
      <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      <svg class="icon-static" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Actualiser
    </button>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="big">PL</div>
      <p>Lance une actualisation pour obtenir les actus du jour.</p>
      <button class="btn-refresh" onclick="loadDigest()" style="margin: 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Charger l'actu
      </button>
    </div>
  </div>
</main>

<div class="reader-overlay" id="reader-overlay">
  <div class="reader-header">
    <button class="btn-back" onclick="closeReader()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Retour
    </button>
  </div>
  <img class="reader-image img-loading" id="reader-image" alt="">
  <div class="reader-body-wrap">
    <div class="reader-meta">
      <span class="series-badge" id="reader-badge"></span>
    </div>
    <h1 class="reader-title" id="reader-title"></h1>
    <div class="reader-text" id="reader-text"></div>
  </div>
</div>

<footer>
  <div class="red-line"></div>
  <span>Synthèse IA · Sources vérifiées</span>
  <div class="red-line"></div>
</footer>

<script>
const PROXY = "https://pitlane-lake.vercel.app/api/digest";

const SERIES_CONFIG = {
  F1: {
    label: "Formule 1",
    prompt: `Tu es un journaliste sport automobile francophone. Recherche sur le web les actualités de la Formule 1 de ces derniers jours.

Identifie tous les sujets distincts qui méritent un article séparé aujourd'hui. Le premier article doit TOUJOURS être, si une course a eu lieu récemment, la synthèse complète du dernier Grand Prix (résultats, déroulé de course, faits marquants). Ajoute ensuite d'autres articles séparés selon l'actualité réelle : classement championnat, transferts ou rumeurs de pilotes, actu technique/réglementaire, déclarations marquantes, calendrier, etc. Le nombre total d'articles dépend de l'actualité réelle du jour — n'invente rien, ne force pas un nombre fixe.

Pour chaque article, fournis aussi un court "excerpt" (1 phrase d'accroche, 15 mots max) et un "imageQuery" : 2-4 mots-clés EN ANGLAIS décrivant une image qui illustrerait bien le sujet (ex: "Formula 1 podium champagne celebration", "Formula 1 pit stop tyre change", "Formula 1 race start grid"). Ne mentionne jamais de nom de pilote ou marque précise dans imageQuery, reste générique sur l'ambiance/action.

Réponds UNIQUEMENT avec un objet JSON valide (pas de texte avant/après, pas de balises markdown), au format suivant :
{
  "articles": [
    {
      "category": "Résultat course" | "Championnat" | "Transferts" | "Technique" | "Déclarations" | "Calendrier" | autre catégorie courte pertinente,
      "title": "titre accrocheur 6-10 mots",
      "excerpt": "phrase d'accroche courte",
      "imageQuery": "mots-clés anglais pour image",
      "body": "2 à 3 paragraphes de texte journalistique factuel en français, séparés par \\n\\n"
    }
  ]
}

Date d'aujourd'hui : ${new Date().toLocaleDateString('fr-FR')}.`
  },
  WRC: {
    label: "WRC",
    prompt: `Tu es un journaliste sport automobile francophone spécialisé en rallye. Recherche sur le web les actualités du WRC de ces derniers jours.

Identifie tous les sujets distincts qui méritent un article séparé aujourd'hui. Le premier article doit TOUJOURS être, si un rallye a eu lieu récemment, la synthèse complète du dernier rallye (résultats, déroulé, faits marquants). Ajoute ensuite d'autres articles séparés selon l'actualité réelle : classement championnat, transferts ou rumeurs pilotes/co-pilotes, actu technique/réglementaire, déclarations marquantes, calendrier, etc. Le nombre total d'articles dépend de l'actualité réelle du jour — n'invente rien, ne force pas un nombre fixe.

Pour chaque article, fournis aussi un court "excerpt" (1 phrase d'accroche, 15 mots max) et un "imageQuery" : 2-4 mots-clés EN ANGLAIS décrivant une image qui illustrerait bien le sujet (ex: "rally car gravel jump", "rally car snow stage", "WRC rally car forest stage"). Ne mentionne jamais de nom de pilote ou marque précise dans imageQuery, reste générique sur l'ambiance/action.

Réponds UNIQUEMENT avec un objet JSON valide (pas de texte avant/après, pas de balises markdown), au format suivant :
{
  "articles": [
    {
      "category": "Résultat rallye" | "Championnat" | "Transferts" | "Technique" | "Déclarations" | "Calendrier" | autre catégorie courte pertinente,
      "title": "titre accrocheur 6-10 mots",
      "excerpt": "phrase d'accroche courte",
      "imageQuery": "mots-clés anglais pour image",
      "body": "2 à 3 paragraphes de texte journalistique factuel en français, séparés par \\n\\n"
    }
  ]
}

Date d'aujourd'hui : ${new Date().toLocaleDateString('fr-FR')}.`
  },
  WEC: {
    label: "WEC / Le Mans",
    prompt: `Tu es un journaliste sport automobile francophone spécialisé en endurance. Recherche sur le web les actualités du WEC et des 24 Heures du Mans de ces derniers jours.

Identifie tous les sujets distincts qui méritent un article séparé aujourd'hui. Le premier article doit TOUJOURS être, si une course a eu lieu récemment, la synthèse complète de la dernière course/des 24H du Mans (résultats, déroulé, faits marquants). Ajoute ensuite d'autres articles séparés selon l'actualité réelle : classement championnat constructeurs/pilotes, transferts ou rumeurs, actu technique/réglementaire (Hypercar, LMGT3...), déclarations marquantes, calendrier, etc. Le nombre total d'articles dépend de l'actualité réelle du jour — n'invente rien, ne force pas un nombre fixe.

Pour chaque article, fournis aussi un court "excerpt" (1 phrase d'accroche, 15 mots max) et un "imageQuery" : 2-4 mots-clés EN ANGLAIS décrivant une image qui illustrerait bien le sujet (ex: "Le Mans 24 hours night race", "endurance racing car pit lane", "Le Mans Hypercar track"). Ne mentionne jamais de nom de pilote ou marque précise dans imageQuery, reste générique sur l'ambiance/action.

Réponds UNIQUEMENT avec un objet JSON valide (pas de texte avant/après, pas de balises markdown), au format suivant :
{
  "articles": [
    {
      "category": "Résultat course" | "Championnat" | "Transferts" | "Technique" | "Déclarations" | "Calendrier" | autre catégorie courte pertinente,
      "title": "titre accrocheur 6-10 mots",
      "excerpt": "phrase d'accroche courte",
      "imageQuery": "mots-clés anglais pour image",
      "body": "2 à 3 paragraphes de texte journalistique factuel en français, séparés par \\n\\n"
    }
  ]
}

Date d'aujourd'hui : ${new Date().toLocaleDateString('fr-FR')}.`
  }
};

let currentSeries = "F1";
let cache = {};

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSeries = tab.dataset.series;
    if (cache[currentSeries]) {
      renderArticleList(cache[currentSeries]);
    } else {
      showEmpty();
    }
  });
});

function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="big">PL</div>
      <p>Lance une actualisation pour obtenir les actus ${SERIES_CONFIG[currentSeries].label}.</p>
      <button class="btn-refresh" onclick="loadDigest()" style="margin: 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Charger l'actu
      </button>
    </div>`;
}

function showSkeleton() {
  const card = () => `
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-text-block">
        <div class="skel-line short"></div>
        <div class="skel-line full" style="margin-top:10px;height:16px"></div>
        <div class="skel-line medium"></div>
      </div>
    </div>`;
  document.getElementById('content').innerHTML =
    `<div class="article-list">${card()}${card()}${card()}</div>`;
}

async function callClaude(userMessage) {
  const response = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      messages: [{ role: "user", content: userMessage }]
    })
  });
  if (!response.ok) throw new Error("API error " + response.status);
  const data = await response.json();
  const text = (data.content || [])
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");
  return text;
}

function extractJSON(text) {
  let cleaned = text.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error("Pas de JSON trouvé dans la réponse");
  cleaned = cleaned.slice(start, end + 1);
  return JSON.parse(cleaned);
}

function imageUrlFor(query, seed) {
  const q = encodeURIComponent(query || "motorsport racing");
  return `https://source.unsplash.com/800x600/?${q}&sig=${seed}`;
}

async function loadDigest() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  btn.disabled = true;
  showSkeleton();

  const config = SERIES_CONFIG[currentSeries];

  try {
    const raw = await callClaude(config.prompt);
    const parsed = extractJSON(raw);
    const articles = (parsed.articles || []).filter(a => a.title && a.body);

    if (articles.length === 0) {
      throw new Error("Aucun article généré");
    }

    articles.forEach((a, i) => {
      a._imgSeed = Date.now() + i;
    });

    cache[currentSeries] = articles;
    renderArticleList(articles);

    const now = new Date();
    document.getElementById('last-update').textContent =
      `Mis à jour ${now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;

  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-msg">
        <div class="icon">⚠</div>
        <p>Impossible de charger l'actu. Vérifie ta connexion et réessaie.</p>
        <p style="font-size:12px;margin-top:8px;color:#444">${err.message}</p>
      </div>`;
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderArticleList(articles) {
  const html = articles.map((article, idx) => {
    const imgUrl = imageUrlFor(article.imageQuery, article._imgSeed || idx);
    return `
      <div class="article-card" onclick="openReader(${idx})">
        <img class="article-image img-loading" src="${imgUrl}" alt="${article.title}"
             onload="this.classList.remove('img-loading')"
             onerror="this.classList.remove('img-loading'); this.src='https://source.unsplash.com/800x600/?motorsport,racing&sig=${idx}'">
        <div class="article-content">
          <div class="article-meta">
            <span class="series-badge badge-${currentSeries}">${article.category || currentSeries}</span>
          </div>
          <div class="article-list-title">${article.title}</div>
          <div class="article-excerpt">${article.excerpt || ''}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="article-list">${html}</div>`;
}

function openReader(idx) {
  const article = cache[currentSeries][idx];
  if (!article) return;

  const imgUrl = imageUrlFor(article.imageQuery, article._imgSeed || idx);
  const img = document.getElementById('reader-image');
  img.classList.add('img-loading');
  img.src = imgUrl;
  img.onload = () => img.classList.remove('img-loading');
  img.onerror = () => {
    img.classList.remove('img-loading');
    img.src = `https://source.unsplash.com/1200x800/?motorsport,racing&sig=${idx}`;
  };

  document.getElementById('reader-badge').textContent = article.category || currentSeries;
  document.getElementById('reader-badge').className = `series-badge badge-${currentSeries}`;
  document.getElementById('reader-title').textContent = article.title;

  const paragraphs = article.body
    .split('\n')
    .map(p => p.trim())
    .filter(p => p.length > 0)
    .map(p => `<p>${p}</p>`)
    .join('');
  document.getElementById('reader-text').innerHTML = paragraphs;

  document.getElementById('reader-overlay').classList.add('open');
  document.getElementById('reader-overlay').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  document.getElementById('reader-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
