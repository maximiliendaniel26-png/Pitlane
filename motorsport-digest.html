<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pit Lane — L'actu motorsport synthétisée</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --border:    #2a2a2a;
    --red:       #e8212b;
    --red-dim:   #7a1218;
    --white:     #f0ede8;
    --muted:     #666;
    --f1:        #e8212b;
    --wrc:       #3b82f6;
    --wec:       #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span {
    color: var(--red);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .timestamp {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* SERIES TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 14px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--muted);
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab:hover { color: var(--white); }

  .tab.active[data-series="F1"]  { color: var(--f1);  border-bottom-color: var(--f1); }
  .tab.active[data-series="WRC"] { color: var(--wrc); border-bottom-color: var(--wrc); }
  .tab.active[data-series="WEC"] { color: var(--wec); border-bottom-color: var(--wec); }

  /* MAIN */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* REFRESH BUTTON */
  .refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .btn-refresh:hover {
    border-color: var(--red);
    background: #1a1010;
  }

  .btn-refresh:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .spin { display: none; }
  .btn-refresh.loading .spin { display: inline; animation: spin 0.8s linear infinite; }
  .btn-refresh.loading .icon-static { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* DIGEST CARD */
  .digest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .digest-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .series-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    text-transform: uppercase;
  }

  .badge-F1  { background: var(--red-dim);  color: var(--f1); }
  .badge-WRC { background: #1e3a5f; color: var(--wrc); }
  .badge-WEC { background: #4a3000; color: var(--wec); }

  .digest-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.02em;
    line-height: 1.2;
    flex: 1;
  }

  .digest-body {
    padding: 20px;
    font-size: 14px;
    line-height: 1.75;
    color: #c8c5c0;
  }

  .digest-body p { margin-bottom: 12px; }
  .digest-body p:last-child { margin-bottom: 0; }

  .sources-section {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .sources-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }

  .source-chip {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    transition: color 0.15s, border-color 0.15s;
    text-decoration: none;
    cursor: default;
  }

  /* SKELETON */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }

  .skel-line {
    height: 12px;
    background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    margin-bottom: 10px;
    border-radius: 2px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .skel-line.short  { width: 40%; }
  .skel-line.medium { width: 70%; }
  .skel-line.full   { width: 100%; }

  /* ERROR */
  .error-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .error-msg .icon { font-size: 32px; margin-bottom: 12px; }
  .error-msg p { font-size: 14px; }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }

  .empty-state .big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 64px;
    font-weight: 900;
    color: #1e1e1e;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 16px;
  }

  .empty-state p {
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* FOOTER */
  footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .red-line {
    width: 24px;
    height: 2px;
    background: var(--red);
  }

  footer span {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    main { padding: 24px 16px 64px; }
    .tabs { padding: 0 16px; }
    .tab { padding: 12px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Pit<span>Lane</span></div>
  <div class="header-right">
    <span class="timestamp" id="last-update">—</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-series="F1">Formule 1</button>
  <button class="tab" data-series="WRC">WRC</button>
  <button class="tab" data-series="WEC">WEC / Le Mans</button>
</nav>

<main>
  <div class="refresh-bar">
    <span class="section-label">Synthèse du jour</span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadDigest()">
      <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      <svg class="icon-static" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Actualiser
    </button>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="big">PL</div>
      <p>Lance une actualisation pour obtenir la synthèse du jour.</p>
      <button class="btn-refresh" onclick="loadDigest()" style="margin: 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Charger l'actu
      </button>
    </div>
  </div>
</main>

<footer>
  <div class="red-line"></div>
  <span>Synthèse IA · Sources vérifiées</span>
  <div class="red-line"></div>
</footer>

<script>
const SERIES_CONFIG = {
  F1: {
    label: "Formule 1",
    color: "#e8212b",
    feeds: [
      { name: "Autosport F1", url: "https://www.autosport.com/rss/f1/news/" },
      { name: "Motorsport.com F1", url: "https://fr.motorsport.com/rss/f1/news/" },
      { name: "RaceFans", url: "https://www.racefans.net/feed/" },
    ],
    prompt: `Tu es un journaliste sport automobile francophone. On t'a transmis des titres et résumés d'articles récents sur la Formule 1. 
Rédige une synthèse journalistique de 3 à 4 paragraphes en français, qui regroupe les informations les plus importantes de l'actu F1 du moment. 
Sois factuel, précis et direct. Mentionne les pilotes, écuries et faits clés. Pas de bullet points, uniquement du texte fluide.`
  },
  WRC: {
    label: "WRC",
    color: "#3b82f6",
    feeds: [
      { name: "DirtFish", url: "https://www.dirtfish.com/feed/" },
      { name: "WRC.com", url: "https://www.wrc.com/en/feed/" },
      { name: "Autosport Rally", url: "https://www.autosport.com/rss/wrc/news/" },
    ],
    prompt: `Tu es un journaliste sport automobile francophone spécialisé en rallye. On t'a transmis des titres et résumés d'articles récents sur le WRC (Championnat du Monde des Rallyes).
Rédige une synthèse journalistique de 3 à 4 paragraphes en français qui regroupe les informations les plus importantes. 
Sois factuel, précis et direct. Mentionne pilotes, constructeurs et résultats. Pas de bullet points, uniquement du texte fluide.`
  },
  WEC: {
    label: "WEC / Le Mans",
    color: "#f59e0b",
    feeds: [
      { name: "Motorsport.com WEC", url: "https://fr.motorsport.com/rss/wec/news/" },
      { name: "Autosport WEC", url: "https://www.autosport.com/rss/wec/news/" },
      { name: "Endurance-Info", url: "https://www.endurance-info.com/feed" },
    ],
    prompt: `Tu es un journaliste sport automobile francophone spécialisé en endurance. On t'a transmis des titres et résumés d'articles récents sur le WEC et les 24 Heures du Mans.
Rédige une synthèse journalistique de 3 à 4 paragraphes en français qui regroupe les informations les plus importantes.
Sois factuel, précis et direct. Mentionne les équipes, pilotes et résultats. Pas de bullet points, uniquement du texte fluide.`
  }
};

let currentSeries = "F1";
let cache = {};

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSeries = tab.dataset.series;
    if (cache[currentSeries]) {
      renderDigest(cache[currentSeries]);
    } else {
      showEmpty();
    }
  });
});

function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="big">PL</div>
      <p>Lance une actualisation pour obtenir la synthèse ${SERIES_CONFIG[currentSeries].label}.</p>
      <button class="btn-refresh" onclick="loadDigest()" style="margin: 0 auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Charger l'actu
      </button>
    </div>`;
}

function showSkeleton() {
  document.getElementById('content').innerHTML = `
    <div class="skeleton">
      <div class="skel-line short"></div>
      <div class="skel-line full" style="margin-top:16px;height:16px"></div>
      <div class="skel-line full"></div>
      <div class="skel-line medium"></div>
      <div class="skel-line full" style="margin-top:16px"></div>
      <div class="skel-line full"></div>
      <div class="skel-line short"></div>
    </div>
    <div class="skeleton">
      <div class="skel-line short"></div>
      <div class="skel-line full" style="margin-top:16px;height:16px"></div>
      <div class="skel-line full"></div>
      <div class="skel-line medium"></div>
    </div>`;
}

async function fetchRSSviaProxy(feedUrl) {
  // On utilise l'API publique rss2json pour parser les flux RSS sans CORS
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&count=8`;
  try {
    const res = await fetch(apiUrl);
    if (!res.ok) return [];
    const data = await res.json();
    if (data.status !== "ok") return [];
    return data.items.map(item => ({
      title: item.title || "",
      description: item.description?.replace(/<[^>]*>/g, "").slice(0, 200) || "",
      source: data.feed?.title || feedUrl
    }));
  } catch {
    return [];
  }
}

async function loadDigest() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  btn.disabled = true;
  showSkeleton();

  const config = SERIES_CONFIG[currentSeries];

  try {
    // 1. Récupération des flux RSS
    const allArticles = [];
    const sourcesUsed = [];

    for (const feed of config.feeds) {
      const articles = await fetchRSSviaProxy(feed.url);
      if (articles.length > 0) {
        allArticles.push(...articles.slice(0, 5));
        sourcesUsed.push(feed.name);
      }
    }

    // Fallback si aucun flux ne répond
    let articlesText = "";
    if (allArticles.length === 0) {
      articlesText = `[Aucun article récupéré via RSS. Génère une synthèse générale sur l'actualité récente ${config.label} basée sur tes connaissances.]`;
    } else {
      articlesText = allArticles.map((a, i) =>
        `Article ${i + 1} — ${a.title}\n${a.description}`
      ).join("\n\n");
    }

    // 2. Appel Claude API
    const prompt = `${config.prompt}\n\nVoici les articles disponibles :\n\n${articlesText}`;

    const response = await fetch("https://pitlane-lake.vercel.app/api/digest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) throw new Error("API error");
    const data = await response.json();
    const text = data.content?.[0]?.text || "";

    // 3. Trouver un titre accrocheur
    const titleRes = await fetch("https://pitlane-lake.vercel.app/api/digest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `En lisant ce résumé ${config.label}, génère un titre accrocheur de 6-10 mots maximum en français, sans ponctuation finale. Réponds uniquement avec le titre.\n\n${text}`
        }]
      })
    });

    const titleData = await titleRes.json();
    const title = titleData.content?.[0]?.text?.trim() || `Actu ${config.label} du jour`;

    const result = {
      series: currentSeries,
      title,
      body: text,
      sources: sourcesUsed.length > 0 ? sourcesUsed : config.feeds.map(f => f.name)
    };

    cache[currentSeries] = result;
    renderDigest(result);

    // Mise à jour timestamp
    const now = new Date();
    document.getElementById('last-update').textContent =
      `Mis à jour ${now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;

  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-msg">
        <div class="icon">⚠</div>
        <p>Impossible de charger l'actu. Vérifie ta connexion et réessaie.</p>
      </div>`;
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function renderDigest(data) {
  const paragraphs = data.body
    .split('\n')
    .filter(p => p.trim().length > 0)
    .map(p => `<p>${p.trim()}</p>`)
    .join('');

  const sourcesHtml = data.sources.map(s =>
    `<span class="source-chip">${s}</span>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="digest-card">
      <div class="digest-header">
        <span class="series-badge badge-${data.series}">${data.series}</span>
        <span class="digest-title">${data.title}</span>
      </div>
      <div class="digest-body">${paragraphs}</div>
      <div class="sources-section">
        <span class="sources-label">Sources</span>
        ${sourcesHtml}
      </div>
    </div>`;
}
</script>
</body>
</html>
